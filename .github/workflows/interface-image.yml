name: Build & Publish Interface Image
on:
    push:
        branches:
            - main
        paths:
            - "interface/**"
            - "settings.default.jsonc"
            - "docker-compose.yml"
            - ".github/workflows/interface-image.yml"
    workflow_dispatch:
permissions:
    contents: read
    packages: write
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Cache node_modules
              id: cache
              uses: actions/cache@v4
              with:
                  path: interface/node_modules
                  key: node-modules-${{ hashFiles('interface/package-lock.json') }}

            - name: Install dependencies (if cache miss)
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci --prefix interface

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: |
                      ghcr.io/${{ github.repository_owner }}/discordclipsaver-interface
                  tags: |
                      type=raw,value=latest
                      type=sha

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: interface/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
