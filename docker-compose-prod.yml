services:
    traefik:
        image: traefik
        container_name: dcs-traefik
        command:
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
            - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
            - --certificatesresolvers.le.acme.httpchallenge=true
            - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik_letsencrypt:/letsencrypt
        labels:
            - traefik.enable=true
        networks:
            - default
        restart: unless-stopped
    bot:
        build:
            context: .
            dockerfile: ./python/bot/Dockerfile
        container_name: dcs-bot
        env_file:
            # - ./python/bot/.env
            - ./.env.global
        depends_on:
            - dcs-postgres
            - dcs-redis
        restart: unless-stopped
        volumes:
            # Optional: mount local settings file for rapid iteration without rebuilding image
            - ./settings.default.json:/app/settings.default.json:ro

    worker:
        build:
            context: .
            dockerfile: ./python/worker/Dockerfile
        # No container_name - allows scaling with --scale worker=N
        env_file:
            # - ./python/worker/.env
            - ./.env.global
        depends_on:
            - dcs-postgres
            - dcs-redis
        restart: unless-stopped
        volumes:
            # Persist thumbnails in shared volume
            - worker_storage:/app/storage
        deploy:
            replicas: 1 # Default number of workers (change to 3 for testing, 5+ for production)

    interface:
        image: ghcr.io/cranberriez/discordclipsaver-interface:latest
        container_name: dcs-interface
        env_file:
            # - ./interface/.env
            - ./.env.global
        environment:
            - BOT_API_URL=http://bot:8000
        depends_on:
            - bot
            - dcs-postgres
            - dcs-redis
        restart: unless-stopped
        volumes:
            # Optional: mount local settings file to the same in-container path used by the image
            - ./settings.default.json:/app/settings.default.json:ro
            # Share worker storage volume to serve thumbnails
            - worker_storage:/app/storage:ro
        labels:
            - traefik.enable=true
            # Service port inside the container
            - traefik.http.services.interface.loadbalancer.server.port=3000

            # Public HTTPS router (test domain)
            - traefik.http.routers.interface-public.rule=Host(`${PUBLIC_DOMAIN}`)
            - traefik.http.routers.interface-public.entrypoints=websecure
            - traefik.http.routers.interface-public.tls=true
            - traefik.http.routers.interface-public.tls.certresolver=le
            - traefik.http.routers.interface-public.middlewares=secure-headers@docker,interface-ratelimit@docker

            # Redirect www -> apex (prevents host-split auth cookies and keeps canonical URLs)
            - traefik.http.routers.interface-www.rule=Host(`www.${PUBLIC_DOMAIN}`)
            - traefik.http.routers.interface-www.entrypoints=websecure
            - traefik.http.routers.interface-www.tls=true
            - traefik.http.routers.interface-www.tls.certresolver=le
            - traefik.http.routers.interface-www.middlewares=redirect-www-to-apex@docker

            - traefik.http.middlewares.redirect-www-to-apex.redirectregex.regex=^https?://www\.(.*)
            - traefik.http.middlewares.redirect-www-to-apex.redirectregex.replacement=https://$${1}
            - traefik.http.middlewares.redirect-www-to-apex.redirectregex.permanent=true

            # Public HTTP -> HTTPS redirect for the same host
            - traefik.http.routers.interface-public-redirect.rule=Host(`${PUBLIC_DOMAIN}`) || Host(`www.${PUBLIC_DOMAIN}`)
            - traefik.http.routers.interface-public-redirect.entrypoints=web
            - traefik.http.routers.interface-public-redirect.middlewares=redirect-to-https@docker

            # Dev HTTP router for localhost (no TLS, dev only)
            - traefik.http.routers.interface-local.rule=Host(`localhost`) || Host(`127.0.0.1`)
            - traefik.http.routers.interface-local.entrypoints=web
            - traefik.http.routers.interface-local.priority=10

            # Middleware: HTTP -> HTTPS
            - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
            - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true

            # Middleware: Security headers
            - traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000
            - traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true
            - traefik.http.middlewares.secure-headers.headers.stsPreload=true
            - traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true
            - traefik.http.middlewares.secure-headers.headers.frameDeny=true
            - traefik.http.middlewares.secure-headers.headers.referrerPolicy=no-referrer

            # Middleware: Basic rate limiting (tune for your needs)
            - traefik.http.middlewares.interface-ratelimit.ratelimit.average=50
            - traefik.http.middlewares.interface-ratelimit.ratelimit.burst=100

    dcs-postgres:
        image: postgres:16-alpine
        container_name: dcs-postgres
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-postgres}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "127.0.0.1:5432:5432"
        networks:
            default:
                ipv4_address: 172.20.0.10
        restart: unless-stopped

    dcs-redis:
        image: redis:7-alpine
        container_name: dcs-redis
        command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
        volumes:
            - redis_data:/data
        networks:
            default:
                ipv4_address: 172.20.0.11
        restart: unless-stopped

    dozzle:
        image: amir20/dozzle:latest
        container_name: dcs-dozzle
        env_file:
            - ./.env.global
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - default
        ports:
            - "127.0.0.1:8088:8080"

    uptime-kuma:
        image: louislam/uptime-kuma:1
        container_name: dcs-uptime-kuma
        env_file:
            - ./.env.global
        restart: unless-stopped
        volumes:
            - kuma_data:/app/data
        networks:
            - default
        ports:
            - "127.0.0.1:3001:3001"

networks:
    default:
        name: discord-clip-saver
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/24

volumes:
    postgres_data:
    redis_data:
    worker_storage:
    traefik_letsencrypt:
    kuma_data:
