services:
    traefik:
        image: traefik
        container_name: dcs-traefik
        command:
            - --api.dashboard=true
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.dashboard.address=:8082 # Dedicated dashboard port
        ports:
            - "80:80"
            - "443:443"
            - "127.0.0.1:8082:8082" # Bind dashboard port to localhost only
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik_letsencrypt:/letsencrypt
        labels:
            - traefik.enable=true
            # Dashboard Router (simpler, no TLS)
            - traefik.http.routers.dashboard.rule=PathPrefix(`/dashboard`)
            - traefik.http.routers.dashboard.service=api@internal
            - traefik.http.routers.dashboard.entrypoints=dashboard
            - traefik.http.routers.dashboard.middlewares=auth,strip-dashboard

            # Middleware: Strip the /dashboard prefix before forwarding
            - traefik.http.middlewares.strip-dashboard.stripprefix.prefixes=/dashboard

            # Middleware: Authentication
            - traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$ulssIwoF$$ctpjqfP9n0yDJhdwVXH050 # generated with htpasswd
        networks:
            - default
        restart: unless-stopped
    bot:
        build:
            context: .
            dockerfile: ./python/bot/Dockerfile
        container_name: dcs-bot
        env_file:
            - ./python/bot/.env
            - ./.env.global
        environment:
            - DB_USER=${POSTGRES_USER}
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_NAME=${POSTGRES_DB}
        depends_on:
            - dcs-postgres
            - dcs-redis
        restart: unless-stopped
        volumes:
            # Optional: mount local settings file for rapid iteration without rebuilding image
            - ./settings.default.json:/app/settings.default.json:ro
        ports:
            - "8000:8000"

    worker:
        build:
            context: .
            dockerfile: ./python/worker/Dockerfile
        # No container_name - allows scaling with --scale worker=N
        env_file:
            - ./python/worker/.env
            - ./.env.global
        environment:
            - DB_USER=${POSTGRES_USER}
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_NAME=${POSTGRES_DB}
        depends_on:
            - dcs-postgres
            - dcs-redis
        restart: unless-stopped
        volumes:
            # Persist thumbnails in shared volume
            - worker_storage:/app/storage
        deploy:
            replicas: 1 # Default number of workers (change to 3 for testing, 5+ for production)

    interface:
        build:
            context: .
            dockerfile: ./interface/Dockerfile
        container_name: dcs-interface
        env_file:
            - ./interface/.env
            - ./.env.global
        environment:
            - BOT_API_URL=http://bot:8000
            - DB_USER=${POSTGRES_USER}
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_NAME=${POSTGRES_DB}
        depends_on:
            - bot
            - dcs-postgres
            - dcs-redis
        restart: unless-stopped
        volumes:
            # Optional: mount local settings file to the same in-container path used by the image
            - ./settings.default.json:/app/settings.default.json:ro
            # Share worker storage volume to serve thumbnails
            - worker_storage:/app/storage:ro
        labels:
            - traefik.enable=true
            # Service port inside the container
            - traefik.http.services.interface.loadbalancer.server.port=3000

            # Dev HTTP router for localhost (no TLS, dev only)
            - traefik.http.routers.interface-local.rule=Host(`localhost`) || Host(`127.0.0.1`)
            - traefik.http.routers.interface-local.entrypoints=web
            - traefik.http.routers.interface-local.priority=10
        ports:
            - "3000:3000"

    dcs-postgres:
        image: postgres:16-alpine
        container_name: dcs-postgres
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-postgres}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            default:
                ipv4_address: 172.20.0.10
        restart: unless-stopped

    dcs-redis:
        image: redis:7-alpine
        container_name: dcs-redis
        command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
        volumes:
            - redis_data:/data
        ports:
            - "6379:6379"
        networks:
            default:
                ipv4_address: 172.20.0.11
        restart: unless-stopped

    dozzle:
        image: amir20/dozzle:latest
        container_name: dcs-dozzle
        env_file:
            - ./.env
            - ./.env.global
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - default
        ports:
            - "127.0.0.1:8088:8080" # Exposed locally at http://localhost:8088

    uptime-kuma:
        image: louislam/uptime-kuma:1
        container_name: dcs-uptime-kuma
        env_file:
            - ./.env
            - ./.env.global
        restart: unless-stopped
        volumes:
            - kuma_data:/app/data
        networks:
            - default
        ports:
            - "127.0.0.1:3001:3001" # Exposed locally at http://localhost:3001

networks:
    default:
        name: discord-clip-saver
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/24

volumes:
    postgres_data:
    redis_data:
    worker_storage:
    traefik_letsencrypt:
    kuma_data:

